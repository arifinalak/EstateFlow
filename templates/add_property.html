{% extends "base.html" %}
{% block title %}Add Property{% endblock %}
{% block content %}
<div class="container page">
  <div class="dash-header">
    <h1>Add New Property</h1>
    <p class="text-muted">Fill in the listing details</p>
  </div>
  <div class="card" style="max-width:600px">
    <form method="post" class="add-property-form" enctype="multipart/form-data">
      <div class="form-group">
        <label>Property Type</label>
        <select name="property_type" id="property_type">
          {% for pt in property_types %}
          <option value="{{ pt }}" {% if selected_property_type == pt %}selected{% endif %}>{{ pt|title }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>Title</label>
        <input type="text" name="title" required placeholder="e.g. Modern Downtown Apartment">
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea name="description" rows="3" placeholder="Describe the property…"></textarea>
      </div>
      <div class="grid-2">
        <div class="form-group">
          <label>Price ($)</label>
          <input type="number" name="price" required placeholder="250000">
        </div>
        <div class="form-group">
          <label>City</label>
          <input type="text" name="city" required placeholder="Dhaka">
        </div>
      </div>
      <div class="grid-2" id="residential-fields" {% if selected_property_type == 'land' %}style="display:none"{% endif %}>
          <div class="form-group" id="bedrooms-group">
            <label>Bedrooms</label>
            <input type="number" name="bedrooms" id="bedrooms" value="0" min="0">
          </div>
          <div class="form-group" id="bathrooms-group">
            <label>Bathrooms</label>
            <input type="number" name="bathrooms" id="bathrooms" value="0" min="0">
          </div>
      </div>

      <div class="form-group">
        <label id="area-label"><span class="area-label-sqft">Area (sqft)</span><span class="area-label-ha">Size (ha)</span></label>
        <input type="number" name="area" id="area" value="0" min="0" step="0.01" required>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="available">Available</option>
          <option value="sold">Sold</option>
          <option value="rented">Rented</option>
        </select>
      </div>
      <div class="form-group">
        <label>Upload Image (Auto-compress to 100KB)</label>
        <input type="file" name="uploaded_image" accept=".jpg,.jpeg,.png,.webp,image/*">
        <small class="text-muted">If no file is uploaded, a default image is picked automatically by property type.</small>
      </div>
      <button class="btn btn-primary" type="submit">Add Listing</button>
      <a href="{{ url_for('agent_dashboard') }}" class="btn btn-outline" style="margin-left:.5rem">Cancel</a>
    </form>
  </div>
</div>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const propertyType = document.getElementById('property_type');
  const bedroomsGroup = document.getElementById('bedrooms-group');
  const bathroomsGroup = document.getElementById('bathrooms-group');
  const bedroomsInput = document.getElementById('bedrooms');
  const bathroomsInput = document.getElementById('bathrooms');
  const areaLabel = document.getElementById('area-label');
  const areaSqftLabel = areaLabel.querySelector('.area-label-sqft');
  const areaHaLabel = areaLabel.querySelector('.area-label-ha');

  const syncFields = () => {
    const isLand = propertyType.value === 'land';
    document.getElementById('residential-fields').style.display = isLand ? 'none' : '';
    bedroomsInput.disabled = isLand;
    bathroomsInput.disabled = isLand;
    bedroomsInput.value = isLand ? 0 : bedroomsInput.value || 0;
    bathroomsInput.value = isLand ? 0 : bathroomsInput.value || 0;
    areaSqftLabel.style.display = isLand ? 'none' : 'inline';
    areaHaLabel.style.display = isLand ? 'inline' : 'none';
  };

  propertyType.addEventListener('input', syncFields);
  propertyType.addEventListener('change', syncFields);
  syncFields();
  window.addEventListener('load', syncFields);
  window.addEventListener('pageshow', syncFields);
  setTimeout(syncFields, 0);
});
</script>
{% endblock %}
