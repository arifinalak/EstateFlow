{% extends "base.html" %}
{% block title %}Login – EstateElite{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-box">
    <h2>Welcome Back</h2>
    <form method="post">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" required placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required placeholder="••••••••">
      </div>
      <button class="btn btn-primary" style="width:100%" type="submit">Login</button>
    </form>
    <p class="text-muted mt2" style="font-size:.85rem;text-align:center">
      No account? <a href="{{ url_for('register') }}">Register here</a>
    </p>
  </div>
</div>
{% endblock %}
